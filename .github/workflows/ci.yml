name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  build-test:
    name: build + test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          global-json-file: global.json

      - name: Restore
        run: dotnet restore DidComm.sln

      - name: Build (warnings as errors — NFR-01)
        run: dotnet build DidComm.sln --configuration Release --no-restore /warnaserror

      - name: Test
        run: dotnet test DidComm.sln --configuration Release --no-build --logger "trx;LogFileName=test-results.trx" --collect "XPlat Code Coverage"

      # Binary/API-compatibility gate: pack every publishable package so SDK Package Validation
      # (EnablePackageValidation, backed by ApiCompat) compares it against the last released version
      # on NuGet and fails the PR on any binary-incompatible change. Runs on Ubuntu only — the check
      # is platform-independent and packing once is sufficient.
      - name: Pack (API/binary compatibility gate)
        if: matrix.os == 'ubuntu-latest'
        run: dotnet pack DidComm.sln --configuration Release --no-build

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-${{ matrix.os }}
          path: |
            **/TestResults/**/test-results.trx
            **/TestResults/**/coverage.cobertura.xml
          if-no-files-found: warn
